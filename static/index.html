<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StorageX</title>
    <link rel="icon" href="/static/favicon.svg?v=__ASSET_VERSION__" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css?v=__ASSET_VERSION__" />
    <script defer src="/static/app.js?v=__ASSET_VERSION__"></script>
  </head>
  <body>
    <header class="app-bar">
      <div class="app-bar__inner">
        <div class="app-bar__brand">
          <img src="/static/favicon.svg?v=__ASSET_VERSION__" class="app-bar__logo" alt="" aria-hidden="true" width="20" height="20" />
          <span class="app-bar__name">StorageX</span>
        </div>
        <div class="app-bar__actions">
          <button id="settings-button" class="nav-btn" type="button" aria-label="Settings" title="Settings">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M10.65 4.35a1.9 1.9 0 0 1 2.7 0l.54.55c.25.24.61.34.95.25l.76-.2a1.9 1.9 0 0 1 2.33 1.64l.08.76c.04.35.27.66.59.82l.69.34a1.9 1.9 0 0 1 .88 2.55l-.33.69c-.16.32-.16.71 0 1.03l.33.69a1.9 1.9 0 0 1-.88 2.55l-.69.34a1.1 1.1 0 0 0-.59.82l-.08.76a1.9 1.9 0 0 1-2.33 1.64l-.76-.2a1.1 1.1 0 0 0-.95.25l-.54.55a1.9 1.9 0 0 1-2.7 0l-.54-.55a1.1 1.1 0 0 0-.95-.25l-.76.2a1.9 1.9 0 0 1-2.33-1.64l-.08-.76a1.1 1.1 0 0 0-.59-.82l-.69-.34a1.9 1.9 0 0 1-.88-2.55l.33-.69a1.16 1.16 0 0 0 0-1.03l-.33-.69a1.9 1.9 0 0 1 .88-2.55l.69-.34c.32-.16.55-.47.59-.82l.08-.76A1.9 1.9 0 0 1 8.4 4.95l.76.2c.34.09.7-.01.95-.25l.54-.55Z" />
              <circle cx="12" cy="12" r="3.2" />
            </svg>
          </button>
          <button id="upload-button" class="primary-btn" type="button" aria-label="Connect" title="Connect">
            <span id="upload-icon" class="primary-btn__icon" aria-hidden="true"></span>
          </button>
        </div>
      </div>
    </header>

    <main class="app-main">
      <section id="data-table" class="data-table" aria-label="Stored files">
        <div class="data-table__head">
          <span>Name</span>
          <span>Type</span>
          <span>Size</span>
          <span>Uploaded</span>
          <span>Download</span>
        </div>
        <div id="files-list" class="data-table__body"></div>
      </section>

      <section id="empty-state" class="empty-state" hidden>
        <p id="empty-title" class="empty-title">No files</p>
      </section>
    </main>

    <input id="upload-input" class="upload-input" type="file" accept=".txt,.mp4,.pdf,.jpeg,.jpg,.png" />

    <div class="toast-stack">
      <section id="job-panel" class="toast" aria-live="polite" hidden>
        <div class="toast__row">
          <span id="job-title" class="toast__label">Processing</span>
          <span id="job-progress-label" class="toast__meta">0%</span>
        </div>
        <div class="progress-track" aria-hidden="true">
          <div id="job-progress-value" class="progress-fill"></div>
        </div>
      </section>
      <section id="flash-message" class="flash-message" aria-live="polite" hidden></section>
    </div>

    <div id="settings-modal" class="modal" hidden>
      <div class="modal__backdrop"></div>
      <div class="modal__panel" role="dialog" aria-modal="true" aria-labelledby="settings-title">
        <div class="modal__head">
          <h2 id="settings-title" class="modal__title">Settings</h2>
          <button id="settings-close" class="icon-btn" type="button" aria-label="Close settings">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" aria-hidden="true">
              <path d="M18 6 6 18M6 6l12 12" />
            </svg>
          </button>
        </div>

        <form id="settings-form" class="modal__form">
          <label class="field">
            <span class="field-label">Encryption key</span>
            <input
              id="settings-key"
              class="field-input"
              type="password"
              inputmode="numeric"
              maxlength="24"
              autocomplete="off"
              autocapitalize="off"
              spellcheck="false"
              placeholder="24-digit key (optional)"
            />
          </label>
          <label class="field">
            <span class="field-label">Client ID</span>
            <input id="settings-client-id" class="field-input" type="text" autocomplete="off" />
          </label>
          <label class="field">
            <span class="field-label">Client Secret</span>
            <input id="settings-client-secret" class="field-input" type="password" autocomplete="off" />
          </label>
          <p id="settings-error" class="form-error" hidden></p>
          <div class="modal__actions">
            <button id="settings-cancel" class="btn btn--ghost" type="button">Cancel</button>
            <button class="btn btn--primary" type="submit">Save</button>
          </div>
        </form>

        <button id="disconnect-button" class="settings-disconnect" type="button" hidden>Disconnect YouTube</button>
      </div>
    </div>

    <div id="key-modal" class="modal" hidden>
      <div class="modal__backdrop"></div>
      <div class="modal__panel modal__panel--sm" role="dialog" aria-modal="true" aria-labelledby="key-modal-title">
        <div class="modal__head">
          <h2 id="key-modal-title" class="modal__title">Enter key</h2>
        </div>
        <form id="key-form" class="modal__form">
          <input
            id="key-input"
            class="field-input key-input"
            type="password"
            inputmode="numeric"
            maxlength="24"
            autocomplete="off"
            autocapitalize="off"
            spellcheck="false"
            placeholder="24-digit key"
            aria-describedby="key-error"
          />
          <p id="key-error" class="form-error" hidden></p>
          <div class="modal__actions">
            <button id="key-cancel" class="btn btn--ghost" type="button">Cancel</button>
            <button class="btn btn--primary" type="submit">Confirm</button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
